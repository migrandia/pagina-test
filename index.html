<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Gran Día | Invitaciones Digitales</title>

<script>
const MI_CONFIGURACION = {
    nombreMarca: "Mi Gran Día",
    tituloHero: "La primera impresión de tu Gran Día comienza aquí.",
    subtituloHero: "Invitaciones digitales e interactivas que enamoran a tus invitados.",
    fraseFinal: '"Porque los mejores momentos de la vida merecen ser anunciados con elegancia."',
    pieDePagina: "Mi Gran Día | Experiencias Digitales",
    whatsappUrl: "https://wa.me/5219911105456",
    enlaceBoda: "https://tu-enlace-de-ejemplo-boda.com",
    enlaceXV: "https://tu-enlace-de-ejemplo-xv.com",
    enlaceBautizo: "https://tu-enlace-de-ejemplo-bautizo.com",
    enlaceBaby: "https://tu-enlace-de-ejemplo-baby.com",
    fotoLogo: "https://www.dropbox.com/scl/fi/7xqcc54jy4qtpgcmn0zhx/logo.png?rlkey=mwuejhlyagpz2r92gestu6yd2&raw=1",
    fotoCelular1: "https://www.dropbox.com/scl/fi/zux2sxkc0jkjm3wl6bah8/celular-boda.png?rlkey=h87ne4ctts5pnmiwtt208tnpj&raw=1",
    fotoCelular2: "https://www.dropbox.com/scl/fi/jez673lm5uja0bp7d4qv8/15.png?rlkey=lizifto81n577oscj8861xo1f&raw=1",
    fotoPortadaBoda: "https://www.dropbox.com/scl/fi/e56oijqyqox41yphxsfjx/boda-web.png?rlkey=r6dkxn3fu3q2vm51jlk74qjq3&raw=1",
    fotoPortadaXV: "https://www.dropbox.com/scl/fi/45vsrjiwvg7rlubvc1g51/xv-a-os.png?rlkey=1poaqg5g3z2b1897s9u7poxj2&raw=1",
    fotoPortadaBautizo: "https://www.dropbox.com/scl/fi/xgrkr563fnhu4bbxoimn6/Bautizo-12.png?rlkey=ng4c8jy07ud2gz5jqgkx8e6pc&raw=1",
    fotoPortadaBaby: "https://www.dropbox.com/scl/fi/0qs4ysv243u1dnfy2eumo/baby-shower.png?rlkey=cd206qfq48u7lqfaheu8k17jb&raw=1"
};
</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--primario: #3e2c24;
--guinda: #660000;
--dorado-brillante: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
--dorado-solido: #c9a96a;
--fondo: linear-gradient(135deg, #fdfbfb 0%, #f1e3d8 100%);
}

/* SEGURIDAD: BLOQUEO DE SELECCIÓN Y ARRASTRE */
*{margin:0;padding:0;box-sizing:border-box; -webkit-user-select: none; user-select: none;}
img { -webkit-user-drag: none; pointer-events: none; }

body{font-family:'Poppins',sans-serif;background:var(--fondo);color:var(--primario);overflow-x:hidden;}

/* HEADER: SÚPER LOGO GRANDE A UN LADO */
.header{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px 50px;position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(201,169,106,0.2);}
.brand-container{display:flex; align-items:center; justify-content: flex-start; gap:40px; max-width: 1400px; margin: 0 auto;}
.logo{height:200px; width: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));} /* Logo mucho más grande */
.brand-name{font-family:'Playfair Display',serif;font-size:3.5rem;color:var(--primario);letter-spacing:6px;text-transform:uppercase; font-weight: 700;}

/* HERO */
.hero{max-width:1400px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:120px 20px;gap:80px;}
.hero-text{flex:1.5; padding-right: 50px;}
.hero h1{font-family:'Playfair Display',serif; font-size:5rem; line-height:1.1; margin-bottom:30px; color: var(--guinda); letter-spacing: -1px;}
.hero p{font-size:1.6rem;color:#6f5a4f;margin-bottom:50px; font-weight: 300; line-height: 1.6;}

.btn{background:var(--dorado-brillante);background-size:200% auto;color:#3e2c24;padding:22px 60px;border-radius:50px;text-decoration:none;font-weight:700;font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; box-shadow:0 10px 30px rgba(181,146,76,0.3);transition:.4s;display:inline-block;cursor:pointer;}
.btn:hover{transform:translateY(-5px);background-position:right center; box-shadow:0 15px 40px rgba(181,146,76,0.5);}

/* CELULARES GRANDES */
.phones{position:relative;flex:1;display:flex;justify-content:center; align-items: center;}
.phone1{width:380px; transform:rotate(-5deg) translateX(60px); filter:drop-shadow(20px 30px 50px rgba(0,0,0,0.18)); z-index: 1;}
.phone2{width:380px; transform:rotate(5deg) translateX(-60px); filter:drop-shadow(-20px 30px 50px rgba(0,0,0,0.18)); z-index: 2;}

/* MODELOS: 4 ALINEADAS EN WEB */
.modelos{background:#fff;padding:120px 20px;text-align:center;border-radius:60px 60px 0 0;}
.modelos h2{font-family:'Playfair Display',serif;font-size:3.8rem;margin-bottom:80px; color: var(--primario);}
.grid{max-width:1400px;margin:auto;display:grid;grid-template-columns: repeat(4, 1fr); gap:30px;} /* Forzado a 4 columnas en web */
.card{background:#fff;border-radius:25px;overflow:hidden;box-shadow:0 15px 35px rgba(0,0,0,0.05);border:1px solid #f1e3d8;transition:.4s;padding-bottom:25px; display: flex; flex-direction: column; justify-content: space-between; height: 100%;}
.card:hover{transform:translateY(-15px); box-shadow: 0 20px 40px rgba(181, 146, 76, 0.15);}
.card img{width:100%;height:350px;object-fit:cover;margin-bottom:20px;}
.card h3{font-family:'Playfair Display',serif;margin-bottom:20px; font-size: 2.2rem; flex-grow: 1; display: flex; align-items: center; justify-content: center;}

/* FOOTER */
.footer-message{padding:140px 20px;text-align:center;background:#fdfbfb;}
.footer-message h2{font-family:'Playfair Display',serif;font-size:3.2rem;font-style:italic;color:var(--primario);max-width:1000px;margin:0 auto 30px;line-height:1.4;}
.pie-texto {color:var(--dorado-solido); letter-spacing:4px; text-transform:uppercase; font-weight:600; font-size: 1.3rem;}
.copyright { margin-top: 60px; font-size: 1.1rem; color: #bbb; letter-spacing: 1px; }

/* WHATSAPP */
.whatsapp{position:fixed;bottom:40px;right:40px;background:#25D366;width:75px;height:75px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);z-index:2000; transition: .3s;}
.whatsapp:hover {transform: scale(1.1);}

/* RESPONSIVO MÓVIL (MANTIENE LOS 2 TELÉFONOS JUNTOS) */
@media(max-width:1100px){
    .grid{grid-template-columns: 1fr 1fr; gap: 20px;} /* En tablets se ven 2x2 */
}

@media(max-width:900px){
    .header{padding:20px; text-align: center;}
    .brand-container{flex-direction: column; text-align: center; gap: 15px; justify-content: center;}
    .logo{height:120px;}
    .brand-name{font-size: 2.5rem; letter-spacing: 3px;}
    
    .hero{flex-direction:column;text-align:center;padding:80px 20px; gap: 50px;}
    .hero-text{padding-right: 0;}
    .hero h1{font-size:3.5rem; margin-bottom: 25px;}
    .hero p{font-size: 1.3rem; margin-bottom: 35px;}
    
    .phones{margin-top: 50px; display: flex; flex-direction: row; justify-content: center; width: 100%;}
    .phone1{width:220px; transform: rotate(-5deg) translateX(20px); display: block !important;}
    .phone2{width:220px; transform: rotate(5deg) translateX(-20px); display: block !important;}
    
    .modelos h2 {font-size: 2.8rem;}
    .grid{grid-template-columns: 1fr;} /* En celular se ven una por una para no deformar las fotos */
    .card img {height: 280px;}
    .card h3 {font-size: 1.8rem;}
    
    .footer-message h2 {font-size: 2.5rem;}
}
</style>
</head>

<body oncontextmenu="return false;">

<header class="header">
    <div class="brand-container">
        <img id="elLogo" class="logo">
        <span id="elNombreMarca" class="brand-name"></span>
    </div>
</header>

<section class="hero">
    <div class="hero-text">
        <h1 id="elTitulo"></h1>
        <p id="elSubtitulo"></p>
        <a id="elBtnHero" class="btn">¡Cotizar mi Invitación!</a>
    </div>

    <div class="phones">
        <img id="elCel1" class="phone1">
        <img id="elCel2" class="phone2">
    </div>
</section>

<section class="modelos">
    <h2>Nuestros Modelos</h2>
    <div class="grid">
        <div class="card">
            <img id="fBoda">
            <h3>Bodas</h3>
            <div style="padding: 0 20px 20px 20px;">
                <a id="linkBoda" class="btn" style="padding:15px 35px;font-size:1rem; width: 100%; text-align: center;">Ver Ejemplo</a>
            </div>
        </div>
        <div class="card">
            <img id="fXV">
            <h3>XV Años</h3>
            <div style="padding: 0 20px 20px 20px;">
                <a id="linkXV" class="btn" style="padding:15px 35px;font-size:1rem; width: 100%; text-align: center;">Ver Ejemplo</a>
            </div>
        </div>
        <div class="card">
            <img id="fBautizo">
            <h3>Bautizos</h3>
            <div style="padding: 0 20px 20px 20px;">
                <a id="linkBautizo" class="btn" style="padding:15px 35px;font-size:1rem; width: 100%; text-align: center;">Ver Ejemplo</a>
            </div>
        </div>
        <div class="card">
            <img id="fBaby">
            <h3>Baby Showers</h3>
            <div style="padding: 0 20px 20px 20px;">
                <a id="linkBaby" class="btn" style="padding:15px 35px;font-size:1rem; width: 100%; text-align: center;">Ver Ejemplo</a>
            </div>
        </div>
    </div>
</section>

<section class="footer-message">
    <h2 id="laFrase"></h2>
    <p id="elPie" class="pie-texto"></p>
    <div class="copyright">© 2024 Mi Gran Día - Todos los derechos reservados.</div>
</section>

<a id="elWA" class="whatsapp" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="40" alt="WA">
</a>

<script>
    document.getElementById('elNombreMarca').innerText = MI_CONFIGURACION.nombreMarca;
    document.getElementById('elLogo').src = MI_CONFIGURACION.fotoLogo;
    document.getElementById('elTitulo').innerText = MI_CONFIGURACION.tituloHero;
    document.getElementById('elSubtitulo').innerText = MI_CONFIGURACION.subtituloHero;
    document.getElementById('elBtnHero').href = MI_CONFIGURACION.whatsappUrl;
    document.getElementById('elWA').href = MI_CONFIGURACION.whatsappUrl;
    
    document.getElementById('elCel1').src = MI_CONFIGURACION.fotoCelular1;
    document.getElementById('elCel2').src = MI_CONFIGURACION.fotoCelular2;
    
    document.getElementById('fBoda').src = MI_CONFIGURACION.fotoPortadaBoda;
    document.getElementById('linkBoda').href = MI_CONFIGURACION.enlaceBoda;
    
    document.getElementById('fXV').src = MI_CONFIGURACION.fotoPortadaXV;
    document.getElementById('linkXV').href = MI_CONFIGURACION.enlaceXV;
    
    document.getElementById('fBautizo').src = MI_CONFIGURACION.fotoPortadaBautizo;
    document.getElementById('linkBautizo').href = MI_CONFIGURACION.enlaceBautizo;
    
    document.getElementById('fBaby').src = MI_CONFIGURACION.fotoPortadaBaby;
    document.getElementById('linkBaby').href = MI_CONFIGURACION.enlaceBaby;
    
    document.getElementById('laFrase').innerText = MI_CONFIGURACION.fraseFinal;
    document.getElementById('elPie').innerText = MI_CONFIGURACION.pieDePagina;
</script>

</body>
</html>
