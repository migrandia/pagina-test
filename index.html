<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Gran Día | Invitaciones Digitales</title>

<script>
const MI_CONFIGURACION = {
    // 1. TEXTOS PRINCIPALES
    nombreMarca: "Mi Gran Día",
    tituloHero: "La primera impresión de tu Gran Día comienza aquí.",
    subtituloHero: "Invitaciones digitales e interactivas que enamoran a tus invitados.",
    fraseFinal: '"Porque los mejores momentos de la vida merecen ser anunciados con elegancia."',
    pieDePagina: "Mi Gran Día | Experiencias Digitales",

    // 2. ENLACES (URLS)
    whatsappUrl: "https://wa.me/5219911105456", // Tu número
    enlaceBoda: "https://tu-enlace-de-ejemplo-boda.com",
    enlaceXV: "https://tu-enlace-de-ejemplo-xv.com",
    enlaceBautizo: "https://tu-enlace-de-ejemplo-bautizo.com",
    enlaceBaby: "https://tu-enlace-de-ejemplo-baby.com",

    // 3. FOTOS (Nombres de archivos en tu GitHub/Dropbox)
    fotoLogo: "https://www.dropbox.com/scl/fi/7xqcc54jy4qtpgcmn0zhx/logo.png?rlkey=mwuejhlyagpz2r92gestu6yd2&raw=1",
    fotoCelular1: "https://www.dropbox.com/scl/fi/zux2sxkc0jkjm3wl6bah8/celular-boda.png?rlkey=h87ne4ctts5pnmiwtt208tnpj&raw=1",
    fotoCelular2: "https://www.dropbox.com/scl/fi/jez673lm5uja0bp7d4qv8/15.png?rlkey=lizifto81n577oscj8861xo1f&raw=1",
    
    // Fotos de los cuadros de abajo
    fotoPortadaBoda: "https://www.dropbox.com/scl/fi/e56oijqyqox41yphxsfjx/boda-web.png?rlkey=r6dkxn3fu3q2vm51jlk74qjq3&raw=1",
    fotoPortadaXV: "https://www.dropbox.com/scl/fi/45vsrjiwvg7rlubvc1g51/xv-a-os.png?rlkey=1poaqg5g3z2b1897s9u7poxj2&raw=1",
    fotoPortadaBautizo: "https://www.dropbox.com/scl/fi/xgrkr563fnhu4bbxoimn6/Bautizo-12.png?rlkey=ng4c8jy07ud2gz5jqgkx8e6pc&raw=1",
    fotoPortadaBaby: "https://www.dropbox.com/scl/fi/0qs4ysv243u1dnfy2eumo/baby-shower.png?rlkey=cd206qfq48u7lqfaheu8k17jb&raw=1"
};
</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--primario: #3e2c24;
--dorado-brillante: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
--dorado-solido: #c9a96a;
--fondo: linear-gradient(135deg, #fdfbfb 0%, #f1e3d8 100%);
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--fondo);color:var(--primario);overflow-x:hidden;}

/* HEADER */
.header{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:15px;text-align:center;position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(201,169,106,0.2);}
.brand-container{display:flex;flex-direction:column;align-items:center;gap:5px;}
.logo{height:50px;}
.brand-name{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--primario);letter-spacing:2px;text-transform:uppercase;}

/* HERO */
.hero{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:80px 20px;gap:40px;}
.hero-text{flex:1;}
.hero h1{font-family:'Playfair Display',serif;font-size:4rem;line-height:1.1;margin-bottom:25px;}
.hero p{font-size:1.2rem;color:#6f5a4f;margin-bottom:40px;}

/* BOTÓN */
.btn{background:var(--dorado-brillante);background-size:200% auto;color:#3e2c24;padding:18px 45px;border-radius:50px;text-decoration:none;font-weight:700;box-shadow:0 10px 30px rgba(181,146,76,0.3);transition:.4s;display:inline-block;cursor:pointer;}
.btn:hover{transform:translateY(-5px);background-position:right center;}

/* CELULARES */
.phones{position:relative;flex:1;display:flex;justify-content:center;}
.phone1{width:270px;transform:rotate(-8deg) translateX(30px);filter:drop-shadow(20px 30px 50px rgba(0,0,0,0.15));}
.phone2{width:270px;transform:rotate(8deg) translateX(-30px);filter:drop-shadow(-20px 30px 50px rgba(0,0,0,0.15));}

/* MODELOS */
.modelos{background:#fff;padding:80px 20px;text-align:center;border-radius:50px 50px 0 0;}
.grid{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;}
.card{background:#fff;border-radius:25px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.05);border:1px solid #f1e3d8;transition:.3s;padding-bottom:20px;}
.card:hover{transform:translateY(-10px);}
.card img{width:100%;height:230px;object-fit:cover;margin-bottom:15px;}
.card h3{font-family:'Playfair Display',serif;margin-bottom:15px;}

/* FOOTER MESSAGE */
.footer-message{padding:100px 20px;text-align:center;background:#fdfbfb;}
.footer-message h2{font-family:'Playfair Display',serif;font-size:2.5rem;font-style:italic;color:var(--primario);max-width:800px;margin:0 auto 20px;line-height:1.3;}
.footer-message p{font-size:1.1rem;color:var(--dorado-solido);letter-spacing:3px;text-transform:uppercase;font-weight:600;}

/* WHATSAPP */
.whatsapp{position:fixed;bottom:30px;right:30px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px rgba(0,0,0,0.15);z-index:2000;}

@media(max-width:900px){
    .hero{flex-direction:column;text-align:center;padding:40px 20px;}
    .hero h1{font-size:2.5rem;}
    .phone2{display:none;}
}
</style>
</head>

<body>

<header class="header">
    <div class="brand-container">
        <img id="elLogo" class="logo">
        <span id="elNombreMarca" class="brand-name"></span>
    </div>
</header>

<section class="hero">
    <div class="hero-text">
        <h1 id="elTitulo"></h1>
        <p id="elSubtitulo"></p>
        <a id="elBtnHero" class="btn">¡Cotizar mi Invitación!</a>
    </div>

    <div class="phones">
        <img id="elCel1" class="phone1">
        <img id="elCel2" class="phone2">
    </div>
</section>

<section class="modelos">
    <h2 style="font-family:'Playfair Display',serif;font-size:2.5rem;margin-bottom:40px;">Nuestros Modelos</h2>
    <div class="grid">
        <div class="card"><img id="fBoda"><h3>Bodas</h3><a id="linkBoda" class="btn" style="padding:10px 25px;font-size:0.9rem;">Ver Ejemplo</a></div>
        <div class="card"><img id="fXV"><h3>XV Años</h3><a id="linkXV" class="btn" style="padding:10px 25px;font-size:0.9rem;">Ver Ejemplo</a></div>
        <div class="card"><img id="fBautizo"><h3>Bautizos</h3><a id="linkBautizo" class="btn" style="padding:10px 25px;font-size:0.9rem;">Ver Ejemplo</a></div>
        <div class="card"><img id="fBaby"><h3>Baby Showers</h3><a id="linkBaby" class="btn" style="padding:10px 25px;font-size:0.9rem;">Ver Ejemplo</a></div>
    </div>
</section>

<section class="footer-message">
    <h2 id="laFrase"></h2>
    <p id="elPie"></p>
</section>

<a id="elWA" class="whatsapp" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30" alt="WA">
</a>

<script>
    document.getElementById('elNombreMarca').innerText = MI_CONFIGURACION.nombreMarca;
    document.getElementById('elLogo').src = MI_CONFIGURACION.fotoLogo;
    document.getElementById('elTitulo').innerText = MI_CONFIGURACION.tituloHero;
    document.getElementById('elSubtitulo').innerText = MI_CONFIGURACION.subtituloHero;
    document.getElementById('elBtnHero').href = MI_CONFIGURACION.whatsappUrl;
    document.getElementById('elWA').href = MI_CONFIGURACION.whatsappUrl;
    
    document.getElementById('elCel1').src = MI_CONFIGURACION.fotoCelular1;
    document.getElementById('elCel2').src = MI_CONFIGURACION.fotoCelular2;
    
    document.getElementById('fBoda').src = MI_CONFIGURACION.fotoPortadaBoda;
    document.getElementById('linkBoda').href = MI_CONFIGURACION.enlaceBoda;
    
    document.getElementById('fXV').src = MI_CONFIGURACION.fotoPortadaXV;
    document.getElementById('linkXV').href = MI_CONFIGURACION.enlaceXV;
    
    document.getElementById('fBautizo').src = MI_CONFIGURACION.fotoPortadaBautizo;
    document.getElementById('linkBautizo').href = MI_CONFIGURACION.enlaceBautizo;
    
    document.getElementById('fBaby').src = MI_CONFIGURACION.fotoPortadaBaby;
    document.getElementById('linkBaby').href = MI_CONFIGURACION.enlaceBaby;
    
    document.getElementById('laFrase').innerText = MI_CONFIGURACION.fraseFinal;
    document.getElementById('elPie').innerText = MI_CONFIGURACION.pieDePagina;
</script>

</body>
</html>
