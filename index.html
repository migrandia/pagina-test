<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Gran Día | Invitaciones Digitales</title>

<script>
const MI_CONFIGURACION = {
    nombreMarca: "Mi Gran Día",
    tituloHero: "La primera impresión de tu Gran Día comienza aquí.",
    subtituloHero: "Invitaciones digitales e interactivas que enamoran a tus invitados.",
    fraseFinal: '"Porque los mejores momentos de la vida merecen ser anunciados con elegancia."',
    pieDePagina: "Mi Gran Día | Experiencias Digitales",
    whatsappUrl: "https://wa.me/525654252153",
    enlaceBoda: "https://tu-enlace-de-ejemplo-boda.com",
    enlaceXV: "https://tu-enlace-de-ejemplo-xv.com",
    enlaceBautizo: "https://tu-enlace-de-ejemplo-bautizo.com",
    enlaceBaby: "https://tu-enlace-de-ejemplo-baby.com",
    fotoLogo: "https://www.dropbox.com/scl/fi/7xqcc54jy4qtpgcmn0zhx/logo.png?rlkey=mwuejhlyagpz2r92gestu6yd2&raw=1",
    fotoCelular1: "https://www.dropbox.com/scl/fi/zux2sxkc0jkjm3wl6bah8/celular-boda.png?rlkey=h87ne4ctts5pnmiwtt208tnpj&raw=1",
    fotoCelular2: "https://www.dropbox.com/scl/fi/jez673lm5uja0bp7d4qv8/15.png?rlkey=lizifto81n577oscj8861xo1f&raw=1",
    fotoPortadaBoda: "https://www.dropbox.com/scl/fi/e56oijqyqox41yphxsfjx/boda-web.png?rlkey=r6dkxn3fu3q2vm51jlk74qjq3&raw=1",
    fotoPortadaXV: "https://www.dropbox.com/scl/fi/45vsrjiwvg7rlubvc1g51/xv-a-os.png?rlkey=1poaqg5g3z2b1897s9u7poxj2&raw=1",
    fotoPortadaBautizo: "https://www.dropbox.com/scl/fi/xgrkr563fnhu4bbxoimn6/Bautizo-12.png?rlkey=ng4c8jy07ud2gz5jqgkx8e6pc&raw=1",
    fotoPortadaBaby: "https://www.dropbox.com/scl/fi/0qs4ysv243u1dnfy2eumo/baby-shower.png?rlkey=cd206qfq48u7lqfaheu8k17jb&raw=1"
};
</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --primario: #3e2c24;
    --guinda: #660000;
    --dorado-brillante: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    --dorado-solido: #c9a96a;
    --fondo: linear-gradient(135deg, #fdfbfb 0%, #f1e3d8 100%);
}

/* SEGURIDAD */
*{margin:0;padding:0;box-sizing:border-box; -webkit-user-select: none; user-select: none;}
img { -webkit-user-drag: none; pointer-events: none; }

body{font-family:'Poppins',sans-serif;background:var(--fondo);color:var(--primario);overflow-x:hidden;}

/* --- HEADER PARA ORDENADOR (WEB) --- */
.header {
    background: #fff;
    padding: 30px 60px;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid #eee;
}

.brand-container {
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    max-width: 1400px; 
    margin: 0 auto;
    position: relative;
    padding: 15px 0;
    border-top: 1px solid rgba(201, 169, 106, 0.3);
    border-bottom: 1px solid rgba(201, 169, 106, 0.3);
}

.logo-nombre-grupo {
    display: flex;
    align-items: center;
    gap: 40px;
}

.logo {
    height: 180px;
    width: auto;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08));
    border-right: 1px solid #e5d1b8;
    padding-right: 40px;
}

.brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    color: var(--primario);
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 700;
    line-height: 1;
}

.brand-name::after {
    content: "D I G I T A L   &   E L E G A N T";
    display: block;
    font-family: 'Poppins', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 10px;
    color: var(--dorado-solido);
    margin-top: 15px;
    font-weight: 400;
}

.header-contact {
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primario);
    font-weight: 600;
    border: 1px solid var(--dorado-solido);
    padding: 12px 25px;
    border-radius: 50px;
    text-decoration: none;
    transition: 0.3s;
}

/* HERO */
.hero{max-width:1400px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:100px 20px;gap:80px;}
.hero-text{flex:1.5; padding-right: 50px;}
.hero h1{font-family:'Playfair Display',serif; font-size:4.8rem; color: var(--guinda); line-height:1.1; margin-bottom:30px;}
.hero p{font-size:1.5rem;color:#6f5a4f;margin-bottom:50px;}

.btn{background:var(--dorado-brillante);background-size:200% auto;color:#3e2c24;padding:20px 50px;border-radius:50px;text-decoration:none;font-weight:700;box-shadow:0 10px 30px rgba(181,146,76,0.3);transition:.4s;display:inline-block;cursor:pointer;}

/* CELULARES */
.phones{position:relative;flex:1;display:flex;justify-content:center;}
.phone1{width:350px; transform:rotate(-5deg) translateX(50px); filter:drop-shadow(20px 30px 50px rgba(0,0,0,0.18));}
.phone2{width:350px; transform:rotate(5deg) translateX(-50px); filter:drop-shadow(-20px 30px 50px rgba(0,0,0,0.18));}

/* MODELOS 4 ALINEADOS */
.modelos{background:#fff;padding:100px 20px;text-align:center;border-radius:60px 60px 0 0;}
.grid{max-width:1400px;margin:auto;display:grid;grid-template-columns: repeat(4, 1fr); gap:30px;}
.card{background:#fff;border-radius:25px;overflow:hidden;box-shadow:0 15px 35px rgba(0,0,0,0.05);border:1px solid #f1e3d8;transition:.4s;padding-bottom:25px;}
.card img{width:100%;height:320px;object-fit:cover;margin-bottom:20px;}
.card h3{font-family:'Playfair Display',serif;margin-bottom:20px; font-size: 2rem;}

.footer-message{padding:120px 20px;text-align:center;background:#fdfbfb;}
.footer-message h2{font-family:'Playfair Display',serif;font-size:3rem;font-style:italic;color:var(--primario);max-width:900px;margin:0 auto 30px;}

.whatsapp{position:fixed;bottom:40px;right:40px;background:#25D366;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);z-index:2000;}

/* --- MODO CELULAR (RESPETADO) --- */
@media(max-width:900px){
    .header { padding: 15px; }
    .brand-container { flex-direction: column; border: none; gap: 10px; justify-content: center; padding: 5px 0;}
    .logo-nombre-grupo { flex-direction: column; gap: 10px; }
    .logo { height: 90px; border: none; padding: 0; }
    .brand-name { font-size: 1.8rem; letter-spacing: 2px; text-align: center; }
    .brand-name::after, .header-contact { display: none; }
    
    .hero{flex-direction:column;text-align:center;padding:60px 20px;}
    .hero h1{font-size:2.8rem;}
    
    .phones { display: flex !important; flex-direction: row !important; justify-content: center; margin-top: 30px; }
    .phone1, .phone2 { width: 170px !important; display: block !important; transform: none !important; }
    
    .grid { grid-template-columns: 1fr; }
    .modelos h2 { font-size: 2.2rem; }
}
</style>
</head>

<body oncontextmenu="return false;">

<header class="header">
    <div class="brand-container">
        <div class="logo-nombre-grupo">
            <img id="elLogo" class="logo">
            <span id="elNombreMarca" class="brand-name"></span>
        </div>
        <a href="https://wa.me/525654252153" class="header-contact">Solicitar Info</a>
    </div>
</header>

<section class="hero">
    <div class="hero-text">
        <h1 id="elTitulo"></h1>
        <p id="elSubtitulo"></p>
        <a id="elBtnHero" class="btn">¡Cotizar mi Invitación!</a>
    </div>

    <div class="phones">
        <img id="elCel1" class="phone1">
        <img id="elCel2" class="phone2">
    </div>
</section>

<section class="modelos">
    <h2 style="font-family:'Playfair Display',serif;font-size:3rem;margin-bottom:50px;">Nuestros Modelos</h2>
    <div class="grid">
        <div class="card"><img id="fBoda"><h3>Bodas</h3><div style="padding:0 20px;"><a id="linkBoda" class="btn" style="padding:10px 20px; font-size:0.9rem; width:100%;">Ver Ejemplo</a></div></div>
        <div class="card"><img id="fXV"><h3>XV Años</h3><div style="padding:0 20px;"><a id="linkXV" class="btn" style="padding:10px 20px; font-size:0.9rem; width:100%;">Ver Ejemplo</a></div></div>
        <div class="card"><img id="fBautizo"><h3>Bautizos</h3><div style="padding:0 20px;"><a id="linkBautizo" class="btn" style="padding:10px 20px; font-size:0.9rem; width:100%;">Ver Ejemplo</a></div></div>
        <div class="card"><img id="fBaby"><h3>Baby Showers</h3><div style="padding:0 20px;"><a id="linkBaby" class="btn" style="padding:10px 20px; font-size:0.9rem; width:100%;">Ver Ejemplo</a></div></div>
    </div>
</section>

<section class="footer-message">
    <h2 id="laFrase"></h2>
    <p id="elPie" style="color:var(--dorado-solido); letter-spacing:3px; text-transform:uppercase; font-weight:600;"></p>
    <div style="margin-top:40px; color:#bbb;">© 2025 Mi Gran Día - Todos los derechos reservados.</div>
</section>

<a id="elWA" class="whatsapp" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="38" alt="WA">
</a>

<script>
    document.getElementById('elNombreMarca').innerText = MI_CONFIGURACION.nombreMarca;
    document.getElementById('elLogo').src = MI_CONFIGURACION.fotoLogo;
    document.getElementById('elTitulo').innerText = MI_CONFIGURACION.tituloHero;
    document.getElementById('elSubtitulo').innerText = MI_CONFIGURACION.subtituloHero;
    document.getElementById('elBtnHero').href = MI_CONFIGURACION.whatsappUrl;
    document.getElementById('elWA').href = MI_CONFIGURACION.whatsappUrl;
    document.getElementById('elCel1').src = MI_CONFIGURACION.fotoCelular1;
    document.getElementById('elCel2').src = MI_CONFIGURACION.fotoCelular2;
    document.getElementById('fBoda').src = MI_CONFIGURACION.fotoPortadaBoda;
    document.getElementById('linkBoda').href = MI_CONFIGURACION.enlaceBoda;
    document.getElementById('fXV').src = MI_CONFIGURACION.fotoPortadaXV;
    document.getElementById('linkXV').href = MI_CONFIGURACION.enlaceXV;
    document.getElementById('fBautizo').src = MI_CONFIGURACION.fotoPortadaBautizo;
    document.getElementById('linkBautizo').href = MI_CONFIGURACION.enlaceBautizo;
    document.getElementById('fBaby').src = MI_CONFIGURACION.fotoPortadaBaby;
    document.getElementById('linkBaby').href = MI_CONFIGURACION.enlaceBaby;
    document.getElementById('laFrase').innerText = MI_CONFIGURACION.fraseFinal;
    document.getElementById('elPie').innerText = MI_CONFIGURACION.pieDePagina;
</script>

</body>
</html>
