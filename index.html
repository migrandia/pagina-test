<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
:root{
--primario:#5d4037;
--dorado:#d4af37;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fdfbfb 0%,#ebedee 100%);
color:var(--primario);
}

.header{
text-align:center;
padding:25px;
background:#fff;
}

.logo{
max-width:220px;
}

.hero{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
gap:60px;
padding:60px 20px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:3.2rem;
line-height:1.1;
margin-bottom:20px;
}

.hero p{
font-size:1.2rem;
color:#666;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:16px 40px;
background:var(--dorado);
color:#fff;
border-radius:40px;
text-decoration:none;
font-weight:600;
}

.phones{
display:flex;
gap:20px;
}

.phones img{
width:260px;
border-radius:30px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.modelos{
background:#fff;
padding:70px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:#fff;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:15px;
font-family:'Playfair Display',serif;
}

.btn2{
display:inline-block;
margin-bottom:20px;
padding:10px 25px;
border:2px solid var(--dorado);
border-radius:30px;
text-decoration:none;
color:var(--dorado);
font-weight:600;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
}

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
}

.phones{
flex-direction:column;
align-items:center;
}

.grid{
grid-template-columns:1fr;
}

}
</style>
